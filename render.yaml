services:
  - type: web
    name: stoxpulse-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: REDIS_URL
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: ANGEL_API_KEY
        sync: false
      - key: ANGEL_CLIENT_CODE
        sync: false
      - key: ANGEL_MPIN
        sync: false
      - key: ANGEL_TOTP_SECRET
        sync: false
      - key: PORT
        value: 3000

  - type: web
    name: stoxpulse-web
    runtime: static
    buildCommand: cd apps/mobile && npx expo export --platform web
    staticPublishPath: apps/mobile/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
